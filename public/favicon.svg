<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0A0A0A"/>
  <rect width="32" height="32" rx="7" fill="url(#borderGrad)" opacity="0.15"/>
  <!-- Terminal chevron > -->
  <path d="M7 10.5L13.5 16L7 21.5" stroke="url(#chevronGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor underline _ -->
  <rect x="16" y="20" width="9" height="2.5" rx="1.25" fill="url(#cursorGrad)"/>
  <defs>
    <linearGradient id="chevronGrad" x1="7" y1="10.5" x2="13.5" y2="21.5" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0066FF"/>
      <stop offset="1" stop-color="#00DDFF"/>
    </linearGradient>
    <linearGradient id="cursorGrad" x1="16" y1="20" x2="25" y2="22.5" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0066FF"/>
      <stop offset="1" stop-color="#00DDFF"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0066FF"/>
      <stop offset="1" stop-color="#00DDFF"/>
    </linearGradient>
  </defs>
</svg>
